<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>회원가입</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="signup">
      <div class="signup-card">
        <div class="progress">
          <div class="step active"><span>01</span></div>
          <div class="line"></div>
          <div class="step"><span>02</span></div>
          <div class="line"></div>
          <div class="step"><span>03</span></div>
          <div class="line"></div>
          <div class="step"><span>04</span></div>
          <div class="line"></div>
          <div class="step"><span>05</span></div>
        </div>
        <header class="signup-header">
          <div id="stepNumber">01</div>
          <h2 id="title"></h2>
          <p id="description"></p>
        </header>
        <section id="content"></section>
        <footer class="button-area">
          <button id="prevButton" type="button">이전</button>
          <button id="nextButton" type="button">다음</button>
        </footer>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
