<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>계산기</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="calculator" id="calculator">
      <div class="display-box" id="displayBox">
        <div class="mode-indicator" id="modeIndicator">● 계산 모드</div>
        <div class="expression" id="expression"></div>
        <div class="result" id="result">0</div>
      </div>

      <div class="top-row">
        <button class="btn power" onclick="togglePower()">
          <svg viewBox="0 0 24 24" width="20" height="20">
            <path
              d="M12 2v10"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
            />
            <path
              d="M7.05 4.93a8 8 0 1 0 9.9 0"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
            />
          </svg>
        </button>
        <button class="btn func" onclick="inputOperator('%')">%</button>
        <button class="btn func" onclick="inputBracket('(')">(</button>
        <button class="btn func" onclick="inputBracket(')')">)</button>
        <button class="btn func ce" onclick="clearEntry()">CE</button>
        <button class="btn func" id="historyBtn" onclick="toggleHistoryMode()">
          기록
        </button>
      </div>

      <div class="grid-pad">
        <button class="btn num" onclick="inputNumber('7')">7</button>
        <button class="btn num" onclick="inputNumber('8')">8</button>
        <button class="btn num" onclick="inputNumber('9')">9</button>
        <button class="btn op" onclick="inputOperator('/')">/</button>

        <button class="btn num" onclick="inputNumber('4')">4</button>
        <button class="btn num" onclick="inputNumber('5')">5</button>
        <button class="btn num" onclick="inputNumber('6')">6</button>
        <button class="btn op" onclick="inputOperator('*')">*</button>

        <button class="btn num" onclick="inputNumber('1')">1</button>
        <button class="btn num" onclick="inputNumber('2')">2</button>
        <button class="btn num" onclick="inputNumber('3')">3</button>
        <button class="btn op" onclick="inputOperator('-')">-</button>

        <button class="btn num" onclick="inputNumber('0')">0</button>
        <button class="btn num" onclick="inputDot('.')">.</button>
        <button class="btn equal" onclick="calculateResult()">=</button>
        <button class="btn op" onclick="inputOperator('+')">+</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
