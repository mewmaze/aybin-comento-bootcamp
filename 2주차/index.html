<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>자판기</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <div class="machine">
        <div class="product-panel">
          <div class="product-grid"></div>
          <div class="pickup-box"></div>
        </div>
        <div class="control-panel">
          <div class="display">
            <div class="display-code"></div>
            <div class="display-price"></div>
          </div>
          <div class="keypad">
            <button class="number-btn">1</button>
            <button class="number-btn">2</button>
            <button class="number-btn">3</button>
            <button class="number-btn">4</button>
            <button class="number-btn">5</button>
            <button class="number-btn">6</button>
            <button class="number-btn">7</button>
            <button class="number-btn">8</button>
            <button class="number-btn">9</button>
            <button class="number-btn">0</button>
            <button class="recBtn delete">지움</button>
            <button class="recBtn confirm">확인</button>
          </div>
          <div class="card-slot">
            Card<br />
            TAP
          </div>
        </div>
      </div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
